name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Docker Image bauen
        run: docker build -t guestbook-app .

      - name: Container starten
        run: docker compose up -d

      - name: Warten bis App bereit ist
        run: sleep 5

      - name: App erreichbar prüfen
        run: curl -f http://localhost:5000